<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lazy Loading Demo</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f0f0f;
      font-family:Arial, sans-serif;
      color:white;
      padding:40px 0;
    }

    h1{
      text-align:center;
      margin-bottom:10px;
      font-size:42px;
      letter-spacing:2px;
    }

    p{
      text-align:center;
      margin-bottom:50px;
      color:#aaa;
      font-size:18px;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
    }

    /* Blank placeholder div */
    .blank{
      width:100%;
      height:500px;
      background:#1d1d1d;
      border:2px dashed #444;
      border-radius:18px;
      margin:40px 0;

      display:flex;
      align-items:center;
      justify-content:center;

      font-size:28px;
      color:#777;
      letter-spacing:1px;
    }

    /* Car images */
    .car-img{
      width:100%;
      height:500px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      margin:40px 0;
      box-shadow:0 10px 25px rgba(0,0,0,0.5);

      opacity:0;
      transition:0.5s ease;
      background:#222;
    }

    .car-img.loaded{
      opacity:1;
    }

    .car-img:hover{
      transform:scale(1.01);
    }
  </style>
</head>
<body>

  <h1>🚗 Lazy Loading Images with Intersection Observer</h1>

  <p>
    Scroll down to see images load only when they enter the viewport
  </p>

  <div class="container">

    <!-- Placeholder -->
    <div class="blank">Scroll Down To Load Image</div>

    <!-- Image 1 -->
    <img 
      class="car-img"
      data-src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?q=80&w=2000&auto=format&fit=crop"
      alt="Sports Car">

    <!-- Placeholder -->
    <div class="blank">Loading Next 4K Car Image...</div>

    <!-- Image 2 -->
    <img 
      class="car-img"
      data-src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2000&auto=format&fit=crop"
      alt="Luxury Car">

    <!-- Placeholder -->
    <div class="blank">Loading Next 4K Car Image...</div>

    <!-- Image 3 -->
    <img 
      class="car-img"
      data-src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?q=80&w=2000&auto=format&fit=crop"
      alt="Super Car">

    <!-- Placeholder -->
    <div class="blank">Loading Next 4K Car Image...</div>

    <!-- Image 4 -->
    <img 
      class="car-img"
      data-src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?q=80&w=2000&auto=format&fit=crop"
      alt="Classic Car">

    <!-- Placeholder -->
    <div class="blank">Loading Final 4K Car Image...</div>

    <!-- Image 5 -->
    <img 
      class="car-img"
      data-src="https://images.unsplash.com/photo-1544636331-e26879cd4d9b?q=80&w=2000&auto=format&fit=crop"
      alt="Modern Car">

  </div>

<script>

  // Select all images
  let images = document.querySelectorAll(".car-img");

  // Create Intersection Observer
  const observer = new IntersectionObserver(function(entries, observer){

    entries.forEach(function(entry){

      // If image enters screen
      if(entry.isIntersecting){

        const img = entry.target;

        // Move data-src into src
        img.src = img.dataset.src;

        // Add loaded class after image loads
        img.onload = function(){
          img.classList.add("loaded");
        }

        // Stop observing loaded image
        observer.unobserve(img);
      }

    });

  }, {
    threshold:0.2
  });

  // Observe every image
  images.forEach(function(img){
    observer.observe(img);
  });

</script>

</body>
</html>
