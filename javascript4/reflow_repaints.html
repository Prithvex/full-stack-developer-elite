<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avoid Reflows & Repaints</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            font-family:Arial, sans-serif;
            color:white;
        }

        .container{
            text-align:center;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
            width:90%;
            max-width:500px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            margin-bottom:20px;
            font-size:35px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:30px;
            line-height:1.6;
        }

        .box{
            width:120px;
            height:120px;
            background:#3b82f6;
            margin:20px auto;
            border-radius:16px;

            /* Good performance */
            transition:transform 0.4s ease;
        }

        .move{
            transform:translateX(150px);
        }

        button{
            padding:14px 28px;
            border:none;
            border-radius:12px;
            background:#22c55e;
            color:white;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>⚡ Avoid Reflows & Repaints</h1>

        <p>
            Using <b>transform</b> is faster than changing
            width, height, top, or left repeatedly.
        </p>

        <div class="box" id="box"></div>

        <button id="btn">
            Move Box
        </button>

    </div>

<script>

    const box = document.getElementById("box");
    const btn = document.getElementById("btn");

    btn.addEventListener("click", () => {

        // Efficient animation
        // transform avoids heavy reflows

        box.classList.toggle("move");

    });

</script>

</body>
</html>
