<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSAP ScrollTrigger Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }
        section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
        }

        .hero {
            background: #111;
            color: white;
        }
        #p1 h1{
            background-color: pink;
            color:palevioletred;
        }
        .panel1 {
            background: #ff6b6b;
        }

        .panel2 {
            background: #4ecdc4;
        }

        .panel3 {
            background: #ffe66d;
        }


        
    </style>
</head>
<body>

    <section class="hero">
        Scroll Down ↓
    </section>

    <section class="panel1">
        <div id="p1">
            <h1>I Love you </h1>
            <h2>I Love you too</h2>
        </div>
    </section>

    <section class="panel2">
    </section>

    <section class="panel3">
    </section>

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        gsap.from("#p1 h1", {
            opacity: 0,
            duration: 2,
            x: 500,
            scrollTrigger: {
                trigger: "#p1 h1",
                start: "top 50%",
                markers: true
            }
        });
        
        gsap.from("#p1 h2", {
            opacity: 0,
            duration: 2,
            x: -500,
            scrollTrigger: {
                trigger: "#p1 h2",
                start: "top 50%",
                markers: true
            }
        });
        
       


    </script>

</body>
</html>
