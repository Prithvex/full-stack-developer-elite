<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Navbar</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

nav{
    background: black;
    padding: 20px 40px;
    border-bottom: 1px solid #222;
}

.navbar{
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#logo{
    color: white;
    font-size: 2rem;
    font-weight: bold;
    letter-spacing: 3px;
    cursor: pointer;
}

.nav-links{
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a{
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover{
    color: #00bcd4;
}
h1{
    text-transform: capitalize;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center; /* horizontal */
    align-items: center;     /* vertical */
}
</style>
</head>
<body>

    <nav>
        <div class="navbar">
            <span id="logo">SHINDE</span>
    
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <h1>Prithviraj Industries </h1>

    <!-- GSAP link karo -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
