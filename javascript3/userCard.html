<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Random User Card</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 p-6">

  <!-- Card -->
  <div class="w-[340px] rounded-3xl overflow-hidden bg-white/10 backdrop-blur-xl border border-white/20 shadow-2xl">

    <!-- Top banner -->
    <div class="h-28 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500"></div>

    <div class="flex flex-col items-center px-6 pb-6 -mt-14">

      <!-- Profile Image -->
      <img
        id="user-img"
        class="w-28 h-28 rounded-full border-4 border-white shadow-lg object-cover"
        src=""
        alt="user"
      />

      <!-- Name -->
      <h1 id="name" class="mt-4 text-2xl font-bold text-white text-center">
        Loading...
      </h1>

      <!-- Email -->
      <p id="email" class="text-gray-300 text-sm mt-2 text-center break-all"></p>

      <!-- Country -->
      <p id="country" class="text-indigo-300 text-sm mt-1"></p>

      <!-- Button -->
      <button
        onclick="getUser()"
        class="mt-6 px-6 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold shadow-lg transition flex items-center gap-2"
      >
        🔄 Refresh User
      </button>

    </div>
  </div>

  <script>

    async function getUser() {

      try {

        const res = await fetch("https://randomuser.me/api/");
        const data = await res.json();

        const user = data.results[0];

        document.getElementById("user-img").src = user.picture.large;

        document.getElementById("name").innerText =
          `${user.name.first} ${user.name.last}`;

        document.getElementById("email").innerText =
          user.email;

        document.getElementById("country").innerText =
          user.location.country;

      } catch (err) {
        console.log(err);
      }
    }

    getUser();

  </script>

</body>
</html>
