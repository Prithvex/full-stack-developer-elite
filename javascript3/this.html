        //this is special keyword jista nature change ho jata hain

console.log(this);

//Class in js 
class abc{
    b=2; // let var use nahi kar sakte ho 
    constructor(){
        console.log("hehe");
        this.a=13;
    }
}
let val = new abc(); // new creates an blank object , // this ke jagah pr blank obj aa jayega 
//val is the instance of abc class 

// method ke andar
        let obju = {
            
        name: "harsh",
        age: 26,
        sayName: function () {
            function defg() {
            console.log(this);
        }
            defg();
        },
        };
            obju.sayName();

        //this ki value
        //global -window
        //function window -
        //method with es5 fnc -object
        //method with es6 arrow fnc window -
        //es5 function inside es5 method -window
        //-object arrow function inside es5 method
        // --> because arowfunction hamesha parent se value leta hain
        //event handler -element
        //class -blank object


//Arrow function and lexical this 
// kaha aarow function use kiya hain usse farak padega this ki value ko 


//Manual Binding , bind call Apply 
// call apply bind --> function ko call karte wakt aap uske this ki value set kar sakte ho

let objj={
    name: "prithvi",
    age:22,

};

function f(a, b , c, d){
    console.log(this, a, b, c, d);
}
f();//this ki value --> window hain
f.call(objj)//this ki value --> jo bhi aap call karoge vo ho jayegi 

f.apply(objj, [1, 2, 3, 4]) //apply --> sirf do parameter pass kar sakte ho , 1 is object and another is array values 

let bi= f.bind(objj, 1, 2, 4, 5); // ye jo bind he vo naya function me value store karta hain always 
bi();
