//Make a class 
class MyPencil {
    constructor(name, color, price) {
        this.name = name;
        this.color = color;
        this.price = price;
    }

    write(text) {
        let p = document.createElement("p");

        p.textContent = text;
        p.style.color = this.color;
        document.body.append(p);
    }

    ///erase method
    erase(){
        document.body.querySelectorAll("p").forEach((e)=>{
           
            if (e.style.color===this.color){
                e.remove();
            }
           
        });
    }
}
// objects
let p1 = new MyPencil("Natraj", "red", 10);
let p2 = new MyPencil("Apsara", "blue", 15);


//Extends and Super --> nayi class pichle class ki kuch value use kar sakti ahinn  aur apni kuch value hold kar sakti hain 

class User {
    constructor(name, age, city, profession, color) {
        this.name = name;
        this.age = age;
        this.city = city;
        this.profession = profession;
        this.color= color;
    }

    write(text) {
        let h1= document.createElement("h1");
        h1.textContent= `${this.name} :${text}`
        h1.style.color= this.color;
        document.body.appendChild(h1);
    }

}

//MAKE CLASS ADMIN --> that extends the user
