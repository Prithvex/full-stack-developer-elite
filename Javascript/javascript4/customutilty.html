    <script>
// map -> ek array ke top pe chalta hai and us array ke sabhi members us map function ke andar aate hai and map function ek naya 
//array return krta hai and us naye array mein jo bhi map ne return kiya hoga wahi placed hota hai

    const arr = [1, 2, 3, 4, 5];
    function myMap(arr, callback) {
    let newarr = [];
    for (let i = 0; i < arr.length; i++) {
    newarr.push(callback(arr[i], i, arr));
    }
    return newarr;
    }

    let ans = myMap ([1, 2, 3, 4], (num) => num + 2);
    console.log(ans);

//MAP --> khud ka map function
   let uttar= myMap(arr, function(val){
        return val+2;
    });

    </script>
