<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Splitting Demo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            font-family:Arial, sans-serif;
            color:white;
        }

        .container{
            text-align:center;
            background:#1e293b;
            padding:50px;
            border-radius:20px;
            width:90%;
            max-width:500px;
            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h1{
            font-size:40px;
            margin-bottom:20px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:35px;
            line-height:1.6;
            font-size:18px;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            background:#3b82f6;
            color:white;
            transition:0.3s ease;
            font-weight:bold;
        }

        button:hover{
            background:#2563eb;
            transform:translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>⚡ Code Splitting Demo</h1>

        <p>
            Heavy JavaScript file will load only
            when the button is clicked.
        </p>

        <button id="loadBtn">
            Load Heavy Feature
        </button>

    </div>

    <!-- Main JS -->


    <script>

    const btn = document.getElementById("loadBtn");

    btn.addEventListener("click", async () => {

        console.log("Loading heavy file...");

    // Dynamically import heavy file
    const module = await import("./heavy.js");

    // Run heavy function
    module.veryHeavy();

});

    </script>

<!-- Other code is at heav.js -->
    <script>
        // Heavy code file

export function veryHeavy(){

    console.log("🚀 Giant feature loaded!");

    alert("✅ Heavy feature loaded successfully!");

}
    </script>

    


</body>
</html>
