<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Card UI</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:40px;
      background:#f2f2f2;
      padding:20px;
    }

    /* FORM */

    form{
      width:320px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    form h2{
      text-align:center;
      margin-bottom:20px;
    }

    .img{
      width:100%;
      height:180px;
      border-radius:10px;
      overflow:hidden;
      margin-bottom:15px;
    }

    .img img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    input,
    textarea{
      width:100%;
      padding:10px;
      margin:10px 0;
      border:1px solid #ccc;
      border-radius:6px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      background:#007bff;
      color:white;
      border-radius:6px;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      background:#0056b3;
    }

    /* CARD */

    .card{
      width:300px;
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      text-align:center;
    }

    .card img{
      width:100px;
      height:100px;
      border-radius:50%;
      object-fit:cover;
      margin-bottom:15px;
    }

    .card h2{
      margin-bottom:10px;
      color:#333;
    }

    .card p{
      color:#666;
      margin:6px 0;
    }

    .card{
    width:250px;
    padding:20px;
    background:white;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
    margin:20px;
}

.card img{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
}

  </style>
</head>

<body>

  <!-- FORM -->

  <form>

    <h2>Sample Form</h2>

    <div class="img">
      <img src="https://plus.unsplash.com/premium_photo-1661964177687-57387c2cbd14?q=80&w=1170&auto=format&fit=crop" alt="">
    </div>

    <input type="text" placeholder="First Name" required>

    <input type="text" placeholder="Surname" required>

    <input type="email" placeholder="Email" required>

    <input type="text" placeholder="Profile Pic URL">

    <textarea rows="4" placeholder="Message"></textarea>

    <button type="submit">Submit</button>

  </form>

  <!-- CARD -->
   

</body>
</html>
