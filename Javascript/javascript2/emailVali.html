
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Password Validator</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            width: 100%;
            height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            background-color: #f5f5f5;
        }

        .container{
            width: 350px;

            background-color: white;

            padding: 30px;

            border-radius: 12px;

            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
        }

        .container h1{
            text-align: center;
            margin-bottom: 25px;
        }

        input{
            width: 100%;

            padding: 12px;
            margin-bottom: 15px;

            border: 1px solid #ccc;
            border-radius: 8px;

            font-size: 16px;
        }

        button{
            width: 100%;

            padding: 12px;

            border: none;
            border-radius: 8px;

            background-color: black;
            color: white;

            font-size: 16px;
            cursor: pointer;

            transition: 0.3s;
        }

        button:hover{
            background-color: #333;
        }

        #message{
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

    </style>

</head>
<body>
    <div class="container">

        <form autocomplete="off" id="loginform">

        <h1>Login Form</h1>

        <input type="text" id="email" placeholder="Enter Email">

        <input type="password" id="pass" placeholder="Enter Password">

        <button id="btn">Validate</button>

        <p id="message"></p>

    </form>
    </div>
    


<script src="emailVali.js"></script>
</body>
</html>
