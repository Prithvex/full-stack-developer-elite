    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #hide{
            display: none;
        }
    </style>
</head>
<body>
    
    <form action="">

        <!-- <input required minlength="3" maxlength="15" type="text" name="" id="name" placeholder="name"> -->
        <br><br>
        <div id = "hide">
            <br><br>
            <small> Your name should be greater than 2 characters </small>
        </div>
        <input type="email" name="" id="gmail" placeholder="email">
        <br><br>
        <input type="password" name="" id="pass" placeholder="password">
        <br><br>
        <select>
            <option value="male">male</option>
            <option value="female">female</option>
            <option value="others">other</option>
        </select>
        <br><br>
        <textarea name="" id="" placeholder="Tell us about you..."></textarea>
    </form>

    
</body>
</html>
