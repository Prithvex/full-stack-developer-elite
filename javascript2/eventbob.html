<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

html, body{
    width: 100%;
    height: 100%;
}

#main{
    width: 100%;
    height: 100vh;
    background-color: #f5f5f5;
}

#nav{
    width: 100%;
    height: 80px;
    background-color: black;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 50px;
}

#nav a{
    color: white;
    text-decoration: none;
    font-size: 18px;
    margin-right: 20px;
}

#nav a:hover{
    color: yellow;
}

#nav button{
    padding: 10px 20px;
    border: none;
    background-color: yellow;
    color: black;
    font-size: 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

#nav button:hover{
    background-color: orange;
    transform: scale(1.05);
}

.lt{
    text-decoration: line-through;
}

/* Fruits Section */

h1{
    text-align: center;
    margin-top: 40px;
    margin-bottom: 20px;
    font-size: 40px;
    color: #222;
}

ul{
    width: 350px;
    margin: 0 auto;
    padding: 20px;

    background-color: white;
    border-radius: 12px;

    box-shadow: 0px 4px 15px rgba(0,0,0,0.1);

    list-style: none;
}

ul li{
    padding: 15px 20px;
    margin: 10px 0;

    background-color: #f5f5f5;
    border-radius: 8px;

    font-size: 20px;
    cursor: pointer;

    transition: 0.3s;
}

ul li:hover{
    background-color: yellow;
    transform: translateX(8px);
}

.done{
    text-decoration: line-through;
    background-color: #dcdcdc;
    color: gray;
}
    </style>
</head>
<body>
    <div id = "main">
        <div id="nav">

            <a href="">home </a>
            <a href="">about</a>

            <button>Click to see</button>

        </div>
    </div>

    <hr>
    <hr>

     <h1>Fruits</h1>
    <!-- jab bhi un pe click ho to line- through , cut jaye  
     har ek li pr lagana is not handy , so we add event listner to parent -->
    <ul>
        <li>Apple</li>
        <li>Mango</li>
        <li>Banana</li>
        <li>Orange</li>
        <li>Grapes</li>
    </ul>


</body>
</html>
