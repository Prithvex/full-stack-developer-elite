<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Download Simulation</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    .card{
      width:360px;
      padding:30px;
      border-radius:20px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
      text-align:center;
    }

    .icon{
      font-size:60px;
      margin-bottom:15px;
      animation:float 2s ease-in-out infinite;
    }

    @keyframes float{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-8px);}
    }

    h2{
      margin-bottom:10px;
      font-weight:600;
    }

    p{
      font-size:14px;
      opacity:0.8;
      margin-bottom:25px;
    }

    .progress-box{
      width:100%;
      height:20px;
      background:rgba(255,255,255,0.15);
      border-radius:20px;
      overflow:hidden;
      margin-bottom:15px;
    }

    .progress{
      width:0%;
      height:100%;
      background:linear-gradient(90deg,#22c55e,#06b6d4);
      border-radius:20px;
      transition:width 0.2s;
    }

    .percent{
      margin-bottom:20px;
      font-size:18px;
      font-weight:bold;
    }

    button{
      padding:12px 24px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      font-weight:bold;
      background:#06b6d4;
      color:white;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
      background:#0891b2;
    }

    .done{
      color:#22c55e;
      font-weight:bold;
      margin-top:15px;
      display:none;
      animation:pop 0.5s ease;
    }

    @keyframes pop{
      from{
        transform:scale(0.5);
        opacity:0;
      }
      to{
        transform:scale(1);
        opacity:1;
      }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">⬇️</div>

    <h2>Download Simulation</h2>
    <p>Click the button to start downloading</p>

    <div class="progress-box">
      <div class="progress" id="progress"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <button id="btn">Start Download</button>

    <div class="done" id="done">✔ Download Complete!</div>
  </div>

  <script src="prgBar.js"></script>
</body>
</html>
